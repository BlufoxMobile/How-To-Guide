<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celestial Job Aid Database</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        
        .transition-all {
            transition: all 0.2s ease-in-out;
        }
    </style>
</head>
<body class="min-h-screen text-slate-800">

    <!-- Navigation Header -->
    <header class="bg-indigo-900 text-white py-6 shadow-lg mb-8">
        <div class="container mx-auto px-4 flex flex-col md:flex-row justify-between items-center">
            <div class="mb-4 md:mb-0">
                <h1 class="text-2xl font-bold tracking-tight">Celestial <span class="text-indigo-300">How-To Hub</span></h1>
                <p class="text-indigo-200 text-sm">Employee Knowledge Repository & Search</p>
            </div>
            <div class="text-xs text-indigo-200 bg-indigo-800/50 px-3 py-1 rounded-full border border-indigo-700">
                Total Resources: <span id="stats-total" class="font-bold">0</span>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 pb-20">
        
        <!-- Search and Filter Section -->
        <div class="glass-panel p-6 rounded-2xl shadow-sm mb-8 sticky top-4 z-10 border-t-4 border-indigo-500">
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-4">
                <!-- Search Input -->
                <div class="lg:col-span-2 relative">
                    <input type="text" id="searchInput" placeholder="Type issue or keyword (e.g. 'BYOD', 'RDK', 'Refund')..." 
                           class="w-full pl-12 pr-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all shadow-sm">
                    <div class="absolute left-4 top-3.5 text-slate-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </div>
                </div>

                <!-- Category Filter -->
                <div>
                    <select id="categoryFilter" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none shadow-sm transition-all appearance-none cursor-pointer">
                        <option value="all">All Categories</option>
                        <option value="Authentication & Policy">Authentication & Policy</option>
                        <option value="Billing & Payments">Billing & Payments</option>
                        <option value="Tools & Order Entry">Tools & Order Entry</option>
                        <option value="Troubleshooting">Troubleshooting</option>
                        <option value="Mobile">Mobile</option>
                        <option value="Internet & Hardware">Internet & Hardware</option>
                        <option value="Internet Essentials">Internet Essentials</option>
                        <option value="Training & Skills">Training & Skills</option>
                    </select>
                </div>

                <!-- Sort Order -->
                <div>
                    <select id="sortFilter" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none shadow-sm transition-all appearance-none cursor-pointer">
                        <option value="newest">Latest Updates</option>
                        <option value="az">A-Z Title</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Results Grid -->
        <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Dynamic Content Here -->
        </div>

        <!-- Empty State -->
        <div id="noResults" class="hidden text-center py-20">
            <div class="text-slate-300 mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mx-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 9.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
            <h3 class="text-xl font-semibold text-slate-600">No matching job aids found</h3>
            <p class="text-slate-500">Try adjusting your search terms or category filter.</p>
        </div>
    </main>

    <script>
        // Database of compiled links
        const jobAids = [
            // AUTHENTICATION & POLICY
            { title: "Account Authentication in Einstein 360", category: "Authentication & Policy", link: "https://celestial.cable.comcast.com/knowledge/article-info?query=200826155422561", tags: ["verify", "id", "customer", "security"] },
            { title: "Authentication for Chat Agents — Mercury Help", category: "Authentication & Policy", link: "https://celestial.cable.comcast.com/knowledge/article-info?query=200826155424170", tags: ["chat", "verify", "agent"] },
            { title: "Comcast Identity Verification Policy (REG)", category: "Authentication & Policy", link: "https://celestial.cable.comcast.com/knowledge/article-info?query=241111105932107", tags: ["rules", "sop", "identification"] },
            { title: "Acceptable Forms of Identification Policy", category: "Authentication & Policy", link: "https://celestial.cable.comcast.com/knowledge/article-info?query=200826155444577", tags: ["id", "dl", "passport", "policy"] },
            
            // BILLING & PAYMENTS
            { title: "Identify Paperless Billing Status — Einstein 360", category: "Billing & Payments", link: "https://celestial.cable.comcast.com/knowledge/article-info?query=200826155422942", tags: ["eco", "paperless", "billing", "check"] },
            { title: "Automatic Payments & Paperless Discount (APPD)", category: "Billing & Payments", link: "https://celestial.cable.comcast.com/knowledge/article-info?query=230410115751510", tags: ["autopay", "discount", "savings"] },
            { title: "How to Move Your Due Date", category: "Billing & Payments", link: "https://celestial.cable.comcast.com/knowledge/article-info?query=200826155424100", tags: ["date", "payment", "reschedule"] },
            { title: "Completing Cash Confirmation Process", category: "Billing & Payments", link: "https://celestial.cable.comcast.com/knowledge/article-info?query=260126092053687", tags: ["pos", "money", "register", "close"] },
            { title: "Payment Restrictions Process Overview", category: "Billing & Payments", link: "https://celestial.cable.comcast.com/knowledge/article-info?query=230419121827530", tags: ["denied", "check", "credit"] },

            // TOOLS & ORDER ENTRY
            { title: "Celestial Point of Sale (POS) Overview", category: "Tools & Order Entry", link: "https://celestial.cable.comcast.com/knowledge/article-info?query=251009140641363", tags: ["register", "checkout", "transaction"] },
            { title: "CSG System and Macro IDs Reference", category: "Tools & Order Entry", link: "https://celestial.cable.comcast.com/knowledge/article-info?query=210628134341427", tags: ["csg", "codes", "macros", "shortcut"] },
            { title: "Xfinity Home Security Order Entry — CSG", category: "Tools & Order Entry", link: "https://celestial.cable.comcast.com/knowledge/article-info?query=200826155424814", tags: ["security", "order", "home"] },
            { title: "Address Build Tool (ABT) Guide", category: "Tools & Order Entry", link: "https://celestial.cable.comcast.com/knowledge/article-info?query=200826155423004", tags: ["abt", "missing", "location", "construction"] },
            { title: "Cancel NOW Internet — Einstein 360", category: "Tools & Order Entry", link: "https://celestial.cable.comcast.com/knowledge/article-info?query=250428145818197", tags: ["cancel", "disconnect", "now"] },
            
            // TROUBLESHOOTING
            { title: "RDK-03004 - Trouble Connecting", category: "Troubleshooting", link: "https://celestial.cable.comcast.com/knowledge/article-info?query=200826155419309", tags: ["error", "code", "tv", "connect"] },
            { title: "XRE-03121 - Something went wrong", category: "Troubleshooting", link: "https://celestial.cable.comcast.com/knowledge/article-info?query=200826155419888", tags: ["error", "code", "tv", "fix"] },
            { title: "Gateway Light Status Guide", category: "Troubleshooting", link: "https://celestial.cable.comcast.com/knowledge/article-info?query=200826155424250", tags: ["modem", "lights", "blink", "color"] },
            { title: "RESIN Escalation Path (Advanced Internet)", category: "Troubleshooting", link: "https://celestial.cable.comcast.com/knowledge/article-info?query=200826155421804", tags: ["advanced", "ticket", "internet", "escalate"] },
            
            // MOBILE
            { title: "Process BYOD Orders in Retail360", category: "Mobile", link: "https://celestial.cable.comcast.com/knowledge/article-info?query=200826155424511", tags: ["mobile", "bring", "sim", "activation"] },
            { title: "Xfinity Mobile Escalation Guidebook", category: "Mobile", link: "https://celestial.cable.comcast.com/knowledge/article-info?query=250311160002673", tags: ["mobile", "help", "escalate"] },
            { title: "Mobile Returns & Exchanges Step-by-Step", category: "Mobile", link: "https://celestial.cable.comcast.com/knowledge/article-info?query=200826155423404", tags: ["return", "rma", "swap", "mobile"] },
            { title: "Elite Upgrade Program Details", category: "Mobile", link: "https://celestial.cable.comcast.com/knowledge/article-info?query=250403165714650", tags: ["early", "upgrade", "mobile", "deal"] },
            
            // INTERNET ESSENTIALS
            { title: "Apply for Internet Essentials / IE Plus", category: "Internet Essentials", link: "https://celestial.cable.comcast.com/knowledge/article-info?query=200826155425902", tags: ["ie", "low income", "apply"] },
            { title: "IE Partnership Program (IEPP) Overview", category: "Internet Essentials", link: "https://celestial.cable.comcast.com/knowledge/article-info?query=200826155449496", tags: ["sponsor", "school", "ie"] },
            { title: "IE Amnesty Program Policy", category: "Internet Essentials", link: "https://celestial.cable.comcast.com/knowledge/article-info?query=200826155447742", tags: ["debt", "past due", "amnesty"] }
        ];

        const searchInput = document.getElementById('searchInput');
        const categoryFilter = document.getElementById('categoryFilter');
        const sortFilter = document.getElementById('sortFilter');
        const resultsGrid = document.getElementById('resultsGrid');
        const noResults = document.getElementById('noResults');
        const totalStats = document.getElementById('stats-total');

        function renderResults() {
            const searchTerm = searchInput.value.toLowerCase();
            const selectedCategory = categoryFilter.value;
            const sortBy = sortFilter.value;

            // Filter logic
            let filtered = jobAids.filter(aid => {
                const matchesSearch = aid.title.toLowerCase().includes(searchTerm) || 
                                     aid.tags.some(tag => tag.includes(searchTerm));
                const matchesCategory = selectedCategory === 'all' || aid.category === selectedCategory;
                return matchesSearch && matchesCategory;
            });

            // Sort logic
            if (sortBy === 'az') {
                filtered.sort((a, b) => a.title.localeCompare(b.title));
            } else {
                // Default to newest (represented by order in original array for this mock)
                filtered.reverse();
            }

            // Update Stats
            totalStats.innerText = filtered.length;

            // UI Rendering
            resultsGrid.innerHTML = '';
            
            if (filtered.length === 0) {
                noResults.classList.remove('hidden');
            } else {
                noResults.classList.add('hidden');
                filtered.forEach(aid => {
                    const card = document.createElement('div');
                    card.className = 'glass-panel p-5 rounded-xl transition-all card-hover flex flex-col justify-between';
                    
                    card.innerHTML = `
                        <div>
                            <div class="flex justify-between items-start mb-3">
                                <span class="text-[10px] font-bold uppercase tracking-widest text-indigo-600 bg-indigo-50 px-2 py-1 rounded">
                                    ${aid.category}
                                </span>
                            </div>
                            <h3 class="font-bold text-slate-800 text-lg leading-tight mb-2">${aid.title}</h3>
                            <div class="flex flex-wrap gap-1 mb-4">
                                ${aid.tags.map(tag => `<span class="text-[9px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded border border-slate-200">#${tag}</span>`).join('')}
                            </div>
                        </div>
                        <a href="${aid.link}" target="_blank" class="w-full text-center py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-lg text-sm transition-all flex items-center justify-center gap-2">
                            Open Job Aid
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                            </svg>
                        </a>
                    `;
                    resultsGrid.appendChild(card);
                });
            }
        }

        // Event Listeners
        searchInput.addEventListener('input', renderResults);
        categoryFilter.addEventListener('change', renderResults);
        sortFilter.addEventListener('change', renderResults);

        // Initial Load
        window.onload = renderResults;
    </script>
</body>
</html>
